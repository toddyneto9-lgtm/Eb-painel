<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EB Painel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      background:#0b0b0b;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      width:90%;
      max-width:420px;
      background:#171717;
      border:2px solid #00c853;
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 25px rgba(0,200,83,.35);
    }

    h1{
      color:#00e676;
      margin-bottom:10px;
    }

    p{
      color:#bbb;
      margin-bottom:25px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      margin:8px 0;
      background:#00c853;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
    }

    button:hover{
      transform:scale(1.03);
      background:#00e676;
    }

    .footer{
      margin-top:20px;
      color:#777;
      font-size:13px;
    }
  </style>
</head>

<body>

<div class="card">

<h1>🎖️ EB PAINEL</h1>

<p>Sistema Oficial de Promoções</p>

<button>Promover Militar</button>

<button>Histórico</button>

<button>Militares</button>

<button>Administração</button>

<div class="footer">
Versão 1.0
</div>

</div>

</body>
</html>
